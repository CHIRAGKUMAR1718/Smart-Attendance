<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMAT Attendance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Inter',system-ui,-apple-system,sans-serif;
      background:#0f0f23;color:#f1f5f9;
      min-height:100vh;display:flex;flex-direction:column;
      align-items:center;justify-content:center;overflow:hidden;
    }
    .bg-grid{
      position:fixed;inset:0;
      background-image:
        linear-gradient(rgba(99,102,241,.03) 1px,transparent 1px),
        linear-gradient(90deg,rgba(99,102,241,.03) 1px,transparent 1px);
      background-size:60px 60px;
    }
    .bg-glow{
      position:fixed;width:600px;height:600px;border-radius:50%;
      background:radial-gradient(circle,rgba(99,102,241,.15),transparent 70%);
      top:50%;left:50%;transform:translate(-50%,-50%);
      animation:glow 4s ease-in-out infinite;
    }
    @keyframes glow{
      0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1)}
      50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}
    }
    .container{position:relative;z-index:1;text-align:center;padding:2rem}
    .logo{font-size:.875rem;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:#6366f1;margin-bottom:1rem}
    h1{
      font-size:clamp(2.5rem,6vw,4rem);font-weight:900;
      background:linear-gradient(135deg,#f1f5f9,#6366f1);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;line-height:1.1;margin-bottom:.75rem;
    }
    .subtitle{color:#94a3b8;font-size:1.125rem;margin-bottom:3rem;max-width:420px}
    .cards{display:flex;gap:1.5rem;flex-wrap:wrap;justify-content:center}
    .card{
      display:flex;flex-direction:column;align-items:center;gap:1rem;
      width:230px;padding:2.5rem 2rem;border-radius:1.25rem;
      background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(12px);text-decoration:none;color:#f1f5f9;
      transition:all .3s ease;cursor:pointer;
    }
    .card:hover{
      transform:translateY(-6px);background:rgba(99,102,241,.1);
      border-color:rgba(99,102,241,.3);box-shadow:0 20px 40px rgba(99,102,241,.15);
    }
    .card-icon{
      width:72px;height:72px;border-radius:1.125rem;
      display:flex;align-items:center;justify-content:center;font-size:2rem;
    }
    .card-icon.teacher{background:linear-gradient(135deg,#6366f1,#8b5cf6)}
    .card-icon.student{background:linear-gradient(135deg,#10b981,#06b6d4)}
    .card-title{font-size:1.25rem;font-weight:700}
    .card-desc{color:#94a3b8;font-size:.875rem;line-height:1.5}
    .footer{position:fixed;bottom:2rem;color:#475569;font-size:.75rem;z-index:1}
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="container">
    <div class="logo">&#9889; SMAT</div>
    <h1>Smart Attendance</h1>
    <p class="subtitle">Signal-based attendance tracking. Fast, secure, effortless.</p>
    <div class="cards">
      <a href="/teacher.html" class="card">
        <div class="card-icon teacher">&#128225;</div>
        <div class="card-title">Teacher</div>
        <div class="card-desc">Broadcast signal &amp; track attendance</div>
      </a>
      <a href="/student.html" class="card">
        <div class="card-icon student">&#128241;</div>
        <div class="card-title">Student</div>
        <div class="card-desc">Receive signal &amp; mark your presence</div>
      </a>
    </div>
  </div>
  <div class="footer">SMAT Attendance System</div>
</body>
</html>
